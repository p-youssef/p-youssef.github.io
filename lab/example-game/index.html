<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess the Number — Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #fefefe;
      --card:    #ffffff;
      --border:  #e8e8ec;
      --text:    #111118;
      --text-2:  #4a4a5a;
      --text-3:  #6e6e82;
      --accent:  #4f7ef8;
      --accent-h:#2d62f5;
      --accent-bg:#f0f4ff;
      --radius:  1rem;
      --ease:    cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dark {
      --bg:      #0a0a10;
      --card:    #141420;
      --border:  #222230;
      --text:    #f4f4f8;
      --text-2:  #c8c8d8;
      --text-3:  #8888a0;
      --accent:  #6b92fb;
      --accent-h:#91affd;
      --accent-bg:rgba(79,126,248,.10);
    }

    html { font-size: 16px; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
      transition: background .3s var(--ease), color .3s var(--ease);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 22rem;
      text-align: center;
      box-shadow: 0 8px 40px rgba(17,17,24,.07);
    }

    .emoji { font-size: 3rem; margin-bottom: 1rem; line-height: 1; }

    h1 {
      font-size: 1.375rem;
      font-weight: 800;
      letter-spacing: -.025em;
      margin-bottom: .5rem;
    }

    .subtitle {
      font-size: .875rem;
      color: var(--text-3);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .range-hint {
      display: inline-block;
      font-size: .75rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-bg);
      padding: .25rem .75rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    .input-row {
      display: flex;
      gap: .5rem;
      margin-bottom: 1rem;
    }

    input[type="number"] {
      flex: 1;
      padding: .625rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: .5rem;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 1.125rem;
      font-weight: 600;
      text-align: center;
      transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    button {
      padding: .625rem 1.25rem;
      border: none;
      border-radius: .5rem;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s var(--ease), transform .15s var(--ease);
      white-space: nowrap;
    }
    button:hover { background: var(--accent-h); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: .45; cursor: default; transform: none; }

    .feedback {
      min-height: 1.5rem;
      font-size: .9375rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: .75rem;
      transition: color .2s var(--ease);
    }
    .feedback.higher { color: #e07b28; }
    .feedback.lower  { color: #4f7ef8; }
    .feedback.won    { color: #1a9e5c; }

    .tries {
      font-size: .8rem;
      color: var(--text-3);
      margin-bottom: 1.5rem;
    }

    .play-again {
      display: none;
      width: 100%;
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--border);
      padding: .625rem 1rem;
      margin-top: .5rem;
    }
    .play-again.visible { display: block; }
    .play-again:hover { background: var(--accent-bg); border-color: var(--accent); }

    .back {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-size: .8125rem;
      color: var(--text-3);
      margin-top: 1.5rem;
      text-decoration: none;
      transition: color .2s;
    }
    .back:hover { color: var(--accent); }

    .theme-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 2.25rem;
      height: 2.25rem;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: .5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      transition: color .2s, background .2s;
    }
    .theme-btn:hover { color: var(--text); background: var(--bg); }
    .icon-moon { display: block; }
    .icon-sun  { display: none; }
    .dark .icon-moon { display: none; }
    .dark .icon-sun  { display: block; }
  </style>
</head>
<body>
  <button class="theme-btn" id="theme-btn" aria-label="Toggle dark mode">
    <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
  </button>

  <div class="card" role="main">
    <div class="emoji" aria-hidden="true">🎯</div>
    <h1>Guess the Number</h1>
    <p class="subtitle">I'm thinking of a number.<br />Can you find it?</p>

    <span class="range-hint" id="range-hint" aria-live="polite">Between 1 and 100</span>

    <div class="input-row">
      <input
        type="number"
        id="guess-input"
        min="1"
        max="100"
        placeholder="?"
        aria-label="Your guess"
        autocomplete="off"
      />
      <button id="guess-btn">Guess</button>
    </div>

    <p class="feedback" id="feedback" aria-live="assertive" aria-atomic="true"></p>
    <p class="tries" id="tries" aria-live="polite"></p>

    <button class="play-again" id="play-again-btn" aria-label="Play again">
      Play again
    </button>
  </div>

  <a href="../../lab.html" class="back">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Lab
  </a>

  <script>
    // Dark mode (inherits localStorage state from the main site)
    const html = document.documentElement
    const saved = localStorage.getItem('theme')
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
    if (saved === 'dark' || (!saved && prefersDark)) html.classList.add('dark')

    document.getElementById('theme-btn').addEventListener('click', () => {
      html.classList.toggle('dark')
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light')
    })

    // Game logic
    let secret, tries, lo, hi, over

    function newGame() {
      secret = Math.floor(Math.random() * 100) + 1
      tries  = 0
      lo     = 1
      hi     = 100
      over   = false
      document.getElementById('feedback').textContent     = ''
      document.getElementById('feedback').className       = 'feedback'
      document.getElementById('tries').textContent        = ''
      document.getElementById('range-hint').textContent   = 'Between 1 and 100'
      document.getElementById('guess-input').value        = ''
      document.getElementById('guess-input').disabled     = false
      document.getElementById('guess-btn').disabled       = false
      document.getElementById('play-again-btn').classList.remove('visible')
      document.getElementById('guess-input').focus()
    }

    function submitGuess() {
      if (over) return
      const input = document.getElementById('guess-input')
      const n     = parseInt(input.value, 10)
      if (!n || n < 1 || n > 100) {
        document.getElementById('feedback').textContent = 'Enter a number from 1 to 100.'
        document.getElementById('feedback').className   = 'feedback'
        return
      }
      tries++
      document.getElementById('tries').textContent = `${tries} ${tries === 1 ? 'try' : 'tries'} so far`

      if (n === secret) {
        document.getElementById('feedback').textContent = `🎉 Yes! It was ${secret}. ${tries === 1 ? 'First try!' : `Got it in ${tries}!`}`
        document.getElementById('feedback').className   = 'feedback won'
        document.getElementById('guess-input').disabled = true
        document.getElementById('guess-btn').disabled   = true
        document.getElementById('play-again-btn').classList.add('visible')
        over = true
      } else if (n < secret) {
        lo = Math.max(lo, n + 1)
        document.getElementById('feedback').textContent = '↑ Go higher'
        document.getElementById('feedback').className   = 'feedback higher'
        document.getElementById('range-hint').textContent = `Between ${lo} and ${hi}`
      } else {
        hi = Math.min(hi, n - 1)
        document.getElementById('feedback').textContent = '↓ Go lower'
        document.getElementById('feedback').className   = 'feedback lower'
        document.getElementById('range-hint').textContent = `Between ${lo} and ${hi}`
      }
      input.value = ''
      input.focus()
    }

    document.getElementById('guess-btn').addEventListener('click', submitGuess)
    document.getElementById('guess-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitGuess()
    })
    document.getElementById('play-again-btn').addEventListener('click', newGame)

    newGame()
  </script>
</body>
</html>
